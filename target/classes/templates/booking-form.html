<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Book Tickets - Cinema Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
</head>

<body>
    <header class="main-header">
        <a th:href="@{/}" class="logo-link">
            <h1>
                <img th:src="@{/favicon.png}" alt="Logo" class="header-logo">
                Cinema <span class="accent">Booking</span>
            </h1>
        </a>
        <nav class="header-nav">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/about}">About</a>
        </nav>
    </header>

    <main>
        <div class="booking-header-split">
            <div class="movie-info-left">
                <img th:src="${movie.posterUrl}" th:alt="${movie.title} + ' Poster'" class="movie-poster-small">
                <div>
                    <h3 th:text="${movie.title}" style="margin: 0 0 5px 0; color: var(--accent);">Movie Title</h3>
                    <div class="movie-details" style="margin-bottom: 0;">
                        <span th:text="${movie.year}">2024</span> &bull;
                        <span th:text="${movie.genre}">Genre</span>
                    </div>
                </div>
            </div>

            <div class="screening-info-right">
                <div class="screening-time" th:text="${#temporals.format(screening.startTime, 'dd MMM yyyy, HH:mm')}"
                    style="font-weight: 600; font-size: 1.1rem; color: #fff;">Date & Time</div>
                <div class="screening-location" style="color: #aaa; margin-top: 5px;">📍 at Multiplex cinema, Prague
                </div>
            </div>
        </div>

        <div class="booking-container" style="margin-top: 2rem;">
            <div th:if="${errorMessage}" class="error-message">
                <strong>Error!</strong> <span th:text="${errorMessage}">Validation message</span>
            </div>

            <form th:action="@{'/screenings/' + ${screening.id} + '/checkout'}" th:object="${booking}" method="post"
                class="booking-form">

                <div class="form-group">
                    <label for="customerName">Your Full Name</label>
                    <input type="text" id="customerName" th:field="*{customerName}" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="customerEmail">Email Address</label>
                    <input type="email" id="customerEmail" th:field="*{customerEmail}" required
                        placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="customerAge">Your Age</label>
                    <input type="number" id="customerAge" th:field="*{customerAge}" required placeholder="18" min="1">
                    <small class="hint" th:text="'Movie age rating: ' + ${movie.ageRating} + '+'">Age Rating:
                        12+</small>
                </div>

                <div class="form-group">
                    <label for="ticketsCount">Number of Tickets</label>
                    <input type="number" id="ticketsCount" th:field="*{ticketsCount}" required placeholder="1" min="1"
                        max="6">
                    <small class="hint"
                        th:text="'Price per ticket: ' + ${#numbers.formatDecimal(effectivePrice, 1, 2)} + ' CZK'">Price:
                        150 CZK</small>
                </div>

                <div class="form-group">
                    <label for="paymentMethod">Payment Method</label>
                    <select id="paymentMethod" th:field="*{paymentMethod}" required>
                        <option value="Cash">Cash (pay at cinema)</option>
                        <option value="Google Pay">Google Pay</option>
                        <option value="Doubloons">Pirate Doubloons</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-submit">Checkout</button>
                    <a th:href="@{'/movies/' + ${movie.id} + '/screenings'}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CinemaBooking by Tim Voronkin</p>
        <a href="https://github.com/TimVoronkin/BTDD" class="accent">GitHub</a>
        <span> • <a href="https://www.linkedin.com/in/tim-voronkin/" class="accent">LinkedIn</a></span>
        <span> • <a href="https://zvit.artstation.com/" class="accent">ArtStation</a></span>
    </footer>
</body>

</html>
