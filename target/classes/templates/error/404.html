<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:insert="~{fragments/layout :: head('404 - Not Found')}"></th:block>
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 1rem;
            min-height: 50vh;
        }

        .error-img {
            max-width: 350px;
            width: 100%;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 20px rgba(184, 245, 0, 0.2));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .error-title {
            color: var(--accent);
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .error-subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 2.5rem;
        }

        .btn-large {
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main>
        <div class="error-page">
            <img th:src="@{/imgs/404.png}" alt="404 Error" class="error-img">
            <h2 class="error-title">Popcorn not found!</h2>
            <p class="error-subtitle">It seems you've wandered into an empty theater room...</p>
            <a th:href="@{/}" class="btn btn-large">Back to home page</a>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
