<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Cinema Booking - Sessions')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main>
        <div class="header-section"
            style="display: flex; gap: 2rem; align-items: flex-start; text-align: left; max-width: 800px; margin: 0 auto 3rem auto;">
            <img th:src="${movie.posterUrl}" th:alt="${movie.title} + ' Poster'" class="movie-poster"
                style="width: 250px;">
            <div>
                <h2 th:text="${movie.title} + ' (' + ${movie.year} + ')'">Sessions</h2>
                <div class="movie-details" style="margin-bottom: 1rem;">
                    <span th:text="${movie.genre}">Genre</span> &bull;
                    <span th:text="${movie.runtime}">Runtime</span> &bull;
                    <span class="rating" th:text="${movie.ageRating} + '+'">12+</span>
                </div>
                <p th:text="${movie.description}" class="description">Description</p>
            </div>
        </div>

        <div class="screening-list">
            <div th:each="screening : ${screenings}" class="screening-card">
                <div class="time-info">
                    <span class="date" th:text="${#temporals.format(screening.startTime, 'dd MMM (EEEE)')}">Date</span>
                    <span class="time" th:text="${#temporals.format(screening.startTime, 'HH:mm')}">Time</span>
                </div>
                <div class="price-info">
                    <span class="price-label">Price:</span>
                    <span th:if="${screening.morningScreening}"
                        th:text="${#numbers.formatDecimal(screening.ticketPrice, 1, 2)} + ' CZK'"
                        style="text-decoration: line-through; color: #666; font-size: 0.9rem;">200 CZK</span>
                    <span class="price-value"
                        th:text="${#numbers.formatDecimal(screening.effectivePrice, 1, 2)} + ' CZK'">150.00 CZK</span>
                </div>
                <div class="availability">
                    <span th:text="${screening.availableSeats} + ' / ' + ${screening.totalSeats} + ' seats left'">90/100
                        seats left</span>
                </div>
                <div class="actions">
                    <a th:href="@{'/screenings/' + ${screening.id} + '/book'}" class="btn"
                        th:classappend="${screening.availableSeats == 0} ? 'disabled'">Book Tickets</a>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(screenings)}" class="no-data">
                <p>No sessions found for this movie. Check back later!</p>
            </div>
        </div>

        <div class="back-link">
            <a th:href="@{/}" class="accent">&larr; Back to all movies</a>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
