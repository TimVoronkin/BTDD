<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <th:block th:insert="~{fragments/layout :: head('Booking Success - Cinema Booking')}"></th:block>
    <style>
        .success-box {
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid var(--accent);
        }

        .success-icon {
            font-size: 5rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .booking-ref {
            font-family: monospace;
            font-size: 1.5rem;
            color: #fff;
            background: #333;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            display: inline-block;
            margin: 1.5rem 0;
        }
    </style>
</head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main>
        <div class="success-box">
            <div class="success-icon">✓</div>
            <h2>Booking Confirmed!</h2>
            <p class="description">Your tickets have been successfully reserved.</p>

            <p>Your Booking Reference: <br>
                <span class="booking-ref" th:text="'#' + ${bookingId}">#12345</span>
            </p>

            <div style="margin-top: 2rem;">
                <a th:href="@{/}" class="btn">Return to Schedule</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
