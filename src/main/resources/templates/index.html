<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cinema Booking - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
</head>

<body>
    <header class="main-header">
        <a th:href="@{/}" class="logo-link">
            <h1>
                <img th:src="@{/favicon.png}" alt="Logo" class="header-logo">
                Cinema <span class="accent">Booking</span>
            </h1>
        </a>
        <nav class="header-nav">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/about}">About</a>
        </nav>
    </header>

    <main>
        <h2>Schedule for this month</h2>
        <div class="movie-grid">
            <div th:each="movie : ${movies}" class="movie-card">
                <img th:src="${movie.posterUrl}" th:alt="${movie.title} + ' Poster'" class="movie-poster">
                <h3 th:text="${movie.title} + ' (' + ${movie.year} + ')'">Movie Title</h3>

                <div class="movie-details">
                    <span th:text="${movie.genre}">Genre</span> &bull;
                    <span th:text="${movie.runtime}">Runtime</span>
                </div>

                <p class="description" th:text="${movie.description}">Description</p>
                <div class="meta">
                    <span class="rating" th:text="${movie.ageRating} + '+'">12+</span>
                    <a th:href="@{'/movies/' + ${movie.id} + '/screenings'}" class="btn">View Sessions</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CinemaBooking by Tim Voronkin</p>
        <a href="https://github.com/TimVoronkin/BTDD" class="accent">GitHub</a>
        <span> • <a href="https://www.linkedin.com/in/tim-voronkin/" class="accent">LinkedIn</a></span>
        <span> • <a href="https://zvit.artstation.com/" class="accent">ArtStation</a></span>
    </footer>
</body>

</html>
