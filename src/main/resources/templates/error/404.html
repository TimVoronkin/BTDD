<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>404 - Not Found</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem 1rem;
            min-height: 50vh;
        }

        .error-img {
            max-width: 350px;
            width: 100%;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 20px rgba(184, 245, 0, 0.2));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .error-title {
            color: var(--accent);
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .error-subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 2.5rem;
        }

        .btn-large {
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <a th:href="@{/}" class="logo-link">
            <h1>
                <img th:src="@{/favicon.png}" alt="Logo" class="header-logo">
                Cinema <span class="accent">Booking</span>
            </h1>
        </a>
        <nav class="header-nav">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/about}">About</a>
        </nav>
    </header>

    <main>
        <div class="error-page">
            <img th:src="@{/404.png}" alt="404 Error" class="error-img">
            <h2 class="error-title">Popcorn not found!</h2>
            <p class="error-subtitle">It seems you've wandered into an empty theater room...</p>
            <a th:href="@{/}" class="btn btn-large">Back to home page</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CinemaBooking by Tim Voronkin</p>
        <a href="https://github.com/TimVoronkin/BTDD" class="accent">GitHub</a>
        <span> • <a href="https://www.linkedin.com/in/tim-voronkin/" class="accent">LinkedIn</a></span>
        <span> • <a href="https://zvit.artstation.com/" class="accent">ArtStation</a></span>
    </footer>
</body>

</html>
