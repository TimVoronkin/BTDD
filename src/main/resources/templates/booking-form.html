<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Book Tickets - Cinema Booking')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main>
        <div th:replace="~{fragments/layout :: movie-header(${movie}, ${screening})}"></div>

        <div class="booking-container" style="margin-top: 2rem;">
            <div th:if="${errorMessage}" class="error-message">
                <strong>Error!</strong> <span th:text="${errorMessage}">Validation message</span>
            </div>

            <form th:action="@{'/screenings/' + ${screening.id} + '/checkout'}" th:object="${booking}" method="post"
                class="booking-form">

                <div class="form-group">
                    <label for="customerName">Your Full Name</label>
                    <input type="text" id="customerName" th:field="*{customerName}" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="customerEmail">Email Address</label>
                    <input type="email" id="customerEmail" th:field="*{customerEmail}" required
                        placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="customerAge">Your Age</label>
                    <input type="number" id="customerAge" th:field="*{customerAge}" required placeholder="18" min="1">
                    <small class="hint" th:text="'Movie age rating: ' + ${movie.ageRating} + '+'">Age Rating:
                        12+</small>
                </div>

                <div class="form-group">
                    <label for="ticketsCount">Number of Tickets</label>
                    <input type="number" id="ticketsCount" th:field="*{ticketsCount}" required placeholder="1" min="1"
                        max="6">
                    <small class="hint"
                        th:text="'Price per ticket: ' + ${#numbers.formatDecimal(effectivePrice, 1, 2)} + ' CZK'">Price:
                        150 CZK</small>
                </div>

                <div class="form-group">
                    <label for="paymentMethod">Payment Method</label>
                    <select id="paymentMethod" th:field="*{paymentMethod}" required>
                        <option value="Cash">Cash (pay at cinema)</option>
                        <option value="Google Pay">Google Pay</option>
                        <option value="Doubloons">Pirate Doubloons</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-submit">Checkout</button>
                    <a th:href="@{'/movies/' + ${movie.id} + '/screenings'}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
