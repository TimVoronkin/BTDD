<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('My Ticket - Cinema Booking')}"></head>

<body>
    <header th:replace="~{fragments/layout :: header}"></header>

    <main>
        <div class="manage-container">
            <h2>🎟️ My <span class="accent">Ticket</span></h2>
            <p class="description">Enter the booking reference code and the email you used during checkout to manage
                your reservation.</p>

            <!-- Success message -->
            <div th:if="${successMessage}" class="manage-alert manage-alert--success">
                <span>✅</span>
                <span th:text="${successMessage}"></span>
            </div>

            <!-- Error message -->
            <div th:if="${errorMessage}" class="manage-alert manage-alert--error">
                <span>❌</span>
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/manage/view}" method="post" class="manage-form">

                <div class="form-group">
                    <label for="email">Email Used at Checkout</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="reference">Booking Reference (4 characters)</label>
                    <input type="text" id="reference" name="reference" placeholder="AAAA" maxlength="4" required
                        style="letter-spacing: 0.3em; font-size: 1.2rem;">
                </div>

                <button type="submit" class="btn">Access your ticket →</button>
            </form>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>

</html>
